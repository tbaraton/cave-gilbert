<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test iPad JS</title>
  <style>
    body { background: #111; color: #fff; font-family: sans-serif; padding: 30px; }
    .btn { display: block; width: 100%; padding: 24px; font-size: 20px; border-radius: 12px; border: none; cursor: pointer; margin-bottom: 16px; font-weight: bold; }
    .gold { background: #c9a96e; color: #000; }
    .green { background: #2a6e4a; color: #fff; }
    .red { background: #6e2a2a; color: #fff; }
    #result { padding: 20px; border-radius: 10px; font-size: 18px; margin-top: 20px; display: none; }
    .ok { background: #1a3a1a; border: 2px solid #6ec96e; color: #6ec96e; }
    .ko { background: #3a1a1a; border: 2px solid #c96e6e; color: #c96e6e; }
  </style>
</head>
<body>
  <h1 style="color:#c9a96e">Test JS pur (sans React)</h1>
  <p style="color:#888; margin-bottom: 24px">Tape sur un bouton :</p>

  <!-- Test 1 : onclick inline -->
  <button class="btn gold" onclick="show('✅ JS inline fonctionne !')">
    Test 1 — onclick inline
  </button>

  <!-- Test 2 : addEventListener -->
  <button class="btn green" id="btn2">
    Test 2 — addEventListener
  </button>

  <!-- Test 3 : alert -->
  <button class="btn" style="background:#4a4a9e;color:#fff" onclick="alert('alert fonctionne !')">
    Test 3 — alert()
  </button>

  <div id="result"></div>

  <script>
    // Test 2
    document.getElementById('btn2').addEventListener('click', function() {
      show('✅ addEventListener fonctionne !');
    });

    function show(msg) {
      var el = document.getElementById('result');
      el.textContent = msg;
      el.className = 'ok';
      el.style.display = 'block';
    }

    // Afficher que la page a chargé
    document.addEventListener('DOMContentLoaded', function() {
      document.querySelector('p').textContent = 'JS chargé ✓ — Tape sur un bouton :';
    });
  </script>
</body>
</html>
