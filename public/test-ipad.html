<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnostic iPad</title>
  <!-- Eruda avant tout -->
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>
  <style>
    body { background: #111; color: #fff; font-family: sans-serif; padding: 24px; font-size: 16px; }
    .ok { color: #6ec96e; } .ko { color: #c96e6e; } .wait { color: #c9a96e; }
    li { margin: 10px 0; }
    #log { background: #1a1a1a; border-radius: 8px; padding: 16px; margin-top: 20px; }
  </style>
</head>
<body>
  <h2 style="color:#c9a96e">Diagnostic réseau</h2>
  <p class="wait">Tests en cours...</p>
  <ul id="log"></ul>

  <script>
    var log = document.getElementById('log');
    function add(msg, cls) {
      var li = document.createElement('li');
      li.textContent = msg;
      if (cls) li.className = cls;
      log.appendChild(li);
    }

    add('✓ JS inline fonctionne', 'ok');
    add('✓ Eruda chargé : ' + (typeof eruda !== 'undefined' ? 'oui' : 'non'), 'ok');

    // Test 1 : le manifest Next.js
    fetch('/_next/static/chunks/webpack.js')
      .then(function(r) {
        add('webpack.js : HTTP ' + r.status + (r.ok ? ' ✓' : ' ✗'), r.ok ? 'ok' : 'ko');
      })
      .catch(function(e) { add('webpack.js ERREUR : ' + e.message, 'ko'); });

    // Test 2 : fichier manifest
    fetch('/_next/static/development/_devMiddlewareManifest.json')
      .then(function(r) { add('manifest dev : HTTP ' + r.status, r.ok ? 'ok' : 'wait'); })
      .catch(function(e) { add('manifest dev : ' + e.message, 'ko'); });

    // Test 3 : un chunk connu
    fetch('/_next/static/chunks/main-app.js')
      .then(function(r) {
        add('main-app.js : HTTP ' + r.status + (r.ok ? ' ✓' : ' ✗'), r.ok ? 'ok' : 'ko');
        if (r.ok) {
          return r.text().then(function(t) {
            add('Taille bundle : ' + Math.round(t.length/1024) + ' KB', 'wait');
            // Essayer d'évaluer
            try {
              // Just check first 200 chars for syntax issues
              add('Début bundle : ' + t.substring(0, 80).replace(/\n/g, ' '), 'wait');
            } catch(e2) { add('Parse erreur : ' + e2.message, 'ko'); }
          });
        }
      })
      .catch(function(e) { add('main-app.js ERREUR : ' + e.message, 'ko'); });

    // Test 4 : headers CSP
    fetch('/caisse')
      .then(function(r) {
        var csp = r.headers.get('content-security-policy');
        var xfo = r.headers.get('x-frame-options');
        add('CSP header : ' + (csp ? csp.substring(0, 60) : 'aucun'), csp ? 'ko' : 'ok');
        add('X-Frame-Options : ' + (xfo || 'aucun'), 'wait');
        return r.text();
      })
      .then(function(html) {
        // Chercher le chunk principal dans le HTML
        var match = html.match(/\/_next\/static\/chunks\/([^"]+\.js)/);
        if (match) {
          add('Chunk trouvé dans HTML : ' + match[1], 'wait');
          // Charger ce chunk
          return fetch('/_next/static/chunks/' + match[1])
            .then(function(r2) {
              add('Chunk principal : HTTP ' + r2.status + (r2.ok ? ' ✓' : ' ✗'), r2.ok ? 'ok' : 'ko');
            });
        } else {
          add('Aucun chunk trouvé dans HTML /caisse', 'ko');
        }
      })
      .catch(function(e) { add('Fetch /caisse ERREUR : ' + e.message, 'ko'); });

    add('— consulte aussi la console Eruda (bouton rond) pour les erreurs JS —', 'wait');
  </script>
</body>
</html>
